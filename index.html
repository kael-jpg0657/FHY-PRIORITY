<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>FHY Priority App</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1B5E20"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="FHY Priority"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F6F7F2;
  --surface:#FFFFFF;
  --surface-alt:#F3F6F3;
  --border:#E2E8E3;
  --text:#1B1F1C;
  --text-secondary:#6B7C6E;
  --primary:#1B5E20;
  --primary-2:#2E7D32;
  --primary-hover:#174C1A;
  --primary-pressed:#103913;
  --accent:#A5D6A7;
  --disabled:#C8D6C9;
  --row-hover:#E8F5E9;
  --row-done:#A5D6A7;
  --on-primary:#FFFFFF;
  --shadow:rgba(0,0,0,.05);
  --overlay-tint:rgba(20,28,21,.12);
  --overlay-glass:rgba(27,40,29,.5);
  color-scheme:light;
}
html[data-theme="dark"]{
  --bg:#10140F;
  --surface:#1A2118;
  --surface-alt:#212B1E;
  --border:#2C3A28;
  --text:#E9F0E6;
  --text-secondary:#8FA391;
  --primary:#4CAF50;
  --primary-2:#66BB6A;
  --primary-hover:#81C784;
  --primary-pressed:#388E3C;
  --accent:#2E7D32;
  --disabled:#3A4A37;
  --row-hover:#23301F;
  --row-done:#2E5B30;
  --on-primary:#0E1A0F;
  --shadow:rgba(0,0,0,.45);
  --overlay-tint:rgba(0,0,0,.35);
  --overlay-glass:rgba(10,16,10,.6);
  color-scheme:dark;
}
html,body{transition:background-color .25s ease,color .25s ease}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;padding:14px 10px 80px;color:var(--text)}
.wrapper{max-width:700px;margin:0 auto}

/* HEADER */
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.logo-mark{width:38px;height:38px;border-radius:9px;overflow:hidden;flex-shrink:0;box-shadow:0 3px 10px rgba(27,94,32,.22)}
.logo-mark img{width:100%;height:100%;object-fit:cover;display:block}
.header-text h1{font-size:15px;font-weight:900;color:var(--primary);letter-spacing:-.3px}
.header-text p{font-size:9px;color:var(--text-secondary);margin-top:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.badge{background:var(--accent);border:1px solid var(--primary-2);color:var(--primary);font-size:8px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}

/* THEME TOGGLE */
.theme-toggle{position:relative;width:46px;height:25px;border-radius:14px;background:var(--surface-alt);border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;padding:0 4px;transition:background .25s,border-color .25s}
.theme-toggle .tt-icon{font-size:11px;line-height:1;z-index:1;width:50%;text-align:center;opacity:.55;transition:opacity .2s}
.theme-toggle .tt-knob{position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.3);transition:transform .25s cubic-bezier(.4,0,.2,1),background .25s}
html[data-theme="dark"] .theme-toggle .tt-knob{transform:translateX(19px)}
html[data-theme="light"] .theme-toggle .tt-icon.tt-sun,html:not([data-theme="dark"]) .theme-toggle .tt-icon.tt-sun{opacity:1}
html[data-theme="dark"] .theme-toggle .tt-icon.tt-moon{opacity:1}
html[data-theme="dark"] .theme-toggle .tt-icon.tt-sun{opacity:.4}
html:not([data-theme="dark"]) .theme-toggle .tt-icon.tt-moon{opacity:.4}

/* TOOLBAR */
.search-bar{margin-bottom:8px}
.search-bar input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:12px;font-family:inherit;outline:none;box-shadow:0 1px 3px var(--shadow)}
.search-bar input:focus{border-color:var(--primary-2)}
.search-bar input::placeholder{color:var(--text-secondary)}
.action-bar{display:flex;gap:6px;margin-bottom:12px}
.btn{flex:1;padding:9px 8px;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:none;text-align:center}
.btn-primary{background:var(--primary);color:var(--on-primary);box-shadow:0 2px 8px rgba(27,94,32,.2)}
.btn-primary:active{background:var(--primary-pressed)}
.btn-ghost{background:transparent;border:1.5px solid var(--primary-2);color:var(--primary-2)}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:10px}
.card{position:relative;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 2px 6px var(--shadow)}

/* FINISHED OVERLAY */
.card-finished-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:5;cursor:pointer;border-radius:12px;background:var(--overlay-tint)}
.card-finished-overlay .f-hud{display:flex;flex-direction:column;align-items:center;gap:9px;padding:20px 28px;border-radius:20px;background:var(--overlay-glass);border:1px solid rgba(255,255,255,.18);box-shadow:0 8px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.12);animation:fHudIn .42s cubic-bezier(.34,1.56,.64,1)}
.card-finished-overlay .f-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;background:radial-gradient(circle at 30% 28%,#66BB6A,#2E7D32 55%,#1B5E20);box-shadow:0 3px 10px rgba(46,125,50,.5),inset 0 1px 1px rgba(255,255,255,.5)}
.card-finished-overlay .f-text{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',sans-serif;font-size:15px;font-weight:700;letter-spacing:.2px;color:#fff}
.card-finished-overlay .f-sub{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',sans-serif;font-size:10px;font-weight:500;color:rgba(255,255,255,.62)}
@keyframes fHudIn{0%{opacity:0;transform:scale(.78)}60%{opacity:1;transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
.card.is-finished .card-finished-overlay{display:flex}
.card.overlay-peek .card-finished-overlay{display:none}

/* CARD TOP — Priority big */
.card-top{display:flex;align-items:stretch;border-bottom:1.5px solid var(--border)}
.serial-block{display:flex;align-items:center;justify-content:center;width:28px;background:var(--surface-alt);border-right:1.5px solid var(--border);font-size:10px;font-weight:800;color:var(--text-secondary);flex-shrink:0}
.priority-block{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 12px;background:var(--surface-alt);position:relative;min-height:62px}
.p-label{font-size:7px;font-weight:800;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.priority-num{font-size:28px;font-weight:900;line-height:1;color:var(--primary-2);min-width:46px;text-align:center;outline:none;cursor:text;border-bottom:2px solid rgba(46,125,50,.3);padding-bottom:2px}
.priority-num:empty::before{content:'—';color:var(--disabled);font-size:22px}
.priority-num[data-lvl="1"]{color:#dc2626}
.priority-num[data-lvl="2"]{color:var(--primary)}
.priority-num[data-lvl="3"]{color:var(--primary-2)}
.priority-num[data-lvl="4"]{color:#66BB6A}
.del-card-btn{position:absolute;top:5px;right:7px;background:none;border:none;color:var(--disabled);font-size:14px;cursor:pointer;padding:2px 4px;line-height:1}
.del-card-btn:active{color:#ef4444}

/* INFO ROWS */
.info-row{display:flex;align-items:center;padding:6px 10px;border-bottom:1.5px solid var(--border);gap:8px}
.info-row:last-of-type{border-bottom:none}
.lbl{font-size:7px;font-weight:800;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;flex-shrink:0}
.val{font-size:12px;font-weight:700;color:var(--text);outline:none;cursor:text;text-transform:uppercase;flex:1}
.val:focus{color:var(--primary-2)}
.val:empty::before{color:var(--disabled);font-weight:500;font-size:10px;text-transform:uppercase}
.val.v-product:empty::before{content:'PRODUCT NO.'}
.val.v-qty{min-width:46px;max-width:76px;text-align:right;font-size:12px}
.val.v-qty:empty::before{content:'QTY'}
.val.v-prodline{font-size:18px;font-weight:900;line-height:1.1}
.val.v-prodline:empty::before{content:'PRODUCT LINE';font-size:13px;font-weight:900}
.divider{width:1.5px;height:14px;background:var(--border);flex-shrink:0}

/* SUB TABLE */
.sub-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.sub-table{border-collapse:collapse;width:100%;table-layout:fixed}
.sub-table thead tr{background:var(--surface-alt)}
.sub-table thead th{padding:4px 2px;font-size:6.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;color:var(--text-secondary);border-bottom:1.5px solid var(--border);text-align:center;white-space:nowrap;overflow:hidden}
.sub-table tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
.sub-table tbody tr:last-child{border-bottom:none}
.sub-table tbody tr:nth-child(even){background:var(--surface-alt)}
.sub-table tbody tr:hover{background:var(--row-hover)}
.sub-table tbody tr.row-done{background:var(--row-done);opacity:.55}
.sub-table tbody td{padding:4px 2px;font-size:9px;font-weight:600;color:var(--primary);text-align:center;vertical-align:middle;overflow:hidden;white-space:nowrap}
.sub-table tbody td:nth-child(2){color:var(--text-secondary);font-size:8px}
/* col widths: done, #, circuit, wt, ws, wl, machine, date, status, del */
.sub-table th:nth-child(1),.sub-table td:nth-child(1){width:22px}
.sub-table th:nth-child(2),.sub-table td:nth-child(2){width:18px}
.sub-table th:nth-child(3),.sub-table td:nth-child(3){width:52px}
.sub-table th:nth-child(4),.sub-table td:nth-child(4){width:36px}
.sub-table th:nth-child(5),.sub-table td:nth-child(5){width:30px}
.sub-table th:nth-child(6),.sub-table td:nth-child(6){width:30px}
.sub-table th:nth-child(7),.sub-table td:nth-child(7){width:46px}
.sub-table th:nth-child(8),.sub-table td:nth-child(8){width:100px}
.sub-table th:nth-child(9),.sub-table td:nth-child(9){width:66px}
.sub-table th:nth-child(10),.sub-table td:nth-child(10){width:20px}
.sub-check{width:13px;height:13px;cursor:pointer;accent-color:var(--primary-2)}
.sub-cell{outline:none;cursor:text;display:block;text-transform:uppercase;min-height:13px}
.sub-cell:focus{background:rgba(46,125,50,.08);border-radius:3px;color:var(--primary)}
.sub-cell:empty::before{content:'—';color:var(--disabled);text-transform:none}
.machine-inp{border:none;background:transparent;font-size:9px;font-weight:700;color:var(--primary);font-family:inherit;outline:none;width:100%;text-align:center}
.machine-inp:focus{color:var(--primary-2)}
.machine-inp::placeholder{color:var(--disabled)}
.date-inp{border:none;background:transparent;font-size:8px;font-weight:600;color:var(--text-secondary);font-family:inherit;outline:none;width:100%}
.date-inp:focus{color:var(--primary-2)}
.sub-del{background:none;border:none;color:var(--disabled);font-size:11px;cursor:pointer;padding:1px 4px}
.sub-del:active{color:#ef4444}
.status-select{font-size:6px;font-weight:800;text-transform:uppercase;letter-spacing:.2px;border:none;border-radius:14px;padding:3px 3px;outline:none;cursor:pointer;font-family:inherit;text-align:center;-webkit-appearance:none;appearance:none;width:100%;background:transparent;color:var(--text-secondary);transition:background .15s,color .15s}
.status-select:focus{box-shadow:0 0 0 2px rgba(0,0,0,.12)}
.status-select option{color:#1B1F1C;background:#fff}
.sub-add-row{display:flex;align-items:center;justify-content:center;padding:6px 0;background:var(--surface-alt);border-top:1px solid var(--border);cursor:pointer;font-size:10px;font-weight:700;color:var(--primary-2);gap:4px}
.sub-add-row:active{color:var(--primary)}
.section-label{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:var(--primary);color:var(--on-primary);font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:.6px}
.section-label span{opacity:.7;font-size:7px}
.section-rm{background:rgba(255,255,255,.18);border:none;color:var(--on-primary);font-size:8px;border-radius:50%;width:14px;height:14px;cursor:pointer;margin-left:6px;flex-shrink:0;line-height:1}
.section-rm:active{background:rgba(255,255,255,.35)}
.section-block{border-top:1.5px solid var(--border)}
.section-block:first-child{border-top:none}
.add-process-btn{display:flex;align-items:center;justify-content:center;padding:7px 0;background:var(--surface);border-top:1.5px dashed var(--border);cursor:pointer;font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--primary-2)}
.add-process-btn:active{color:var(--primary);background:var(--row-hover)}
.add-process-form{display:flex;align-items:center;gap:5px;padding:6px 8px;background:var(--surface);border-top:1.5px dashed var(--border)}
.add-process-input{flex:1;font-size:10px;font-family:inherit;font-weight:700;text-transform:uppercase;color:var(--text);background:var(--surface-alt);border:1.5px solid var(--border);border-radius:6px;padding:5px 8px;outline:none}
.add-process-input:focus{border-color:var(--primary-2)}
.add-process-ok,.add-process-cancel{flex-shrink:0;width:24px;height:24px;border-radius:6px;border:none;font-size:11px;font-weight:800;cursor:pointer}
.add-process-ok{background:var(--primary);color:var(--on-primary)}
.add-process-cancel{background:var(--surface-alt);color:var(--text-secondary);border:1.5px solid var(--border)}

/* FOOTER */
.footer{display:flex;justify-content:space-between;margin-top:12px;padding:0 2px}
.footer span{font-size:9px;color:var(--text-secondary)}
</style>
</head>

<script>
(function() {
  var saved = localStorage.getItem('fhy-theme');
  var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>

<script>
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('fhy-theme', next);
  var metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) metaTheme.setAttribute('content', next === 'dark' ? '#10140F' : '#1B5E20');
}

var cards = [];

function uid() { return Date.now() + '_' + Math.floor(Math.random() * 1000000); }

function makeCard(serial) {
  return { id: uid(), serial: serial, priority: '', product: '', qty: '', prodline: '', started: false, extraSections: [],
    straight: [], twisted: [], jointing: [], crimping: [], shieldwire: [], soldering: [] };
}

function makeSubRow() {
  return { id: uid(), circuit: '', wires: '', ws: '', wl: '', machine: '', compdate: '', status: '', done: false };
}

function findCard(id) {
  for (var i = 0; i < cards.length; i++) { if (cards[i].id === id) return cards[i]; }
  return null;
}

function getPriorityLevel(v) {
  var n = parseInt(v);
  if (!v || isNaN(n)) return 0;
  if (n <= 1) return 1;
  if (n <= 3) return 2;
  if (n <= 6) return 3;
  return 4;
}

function autoUpper(el) {
  el.addEventListener('input', function() {
    var sel = window.getSelection();
    var off = 0;
    try { off = sel.getRangeAt(0).startOffset; } catch(e) {}
    var up = el.textContent.toUpperCase();
    if (el.textContent !== up) {
      el.textContent = up;
      try {
        var r = document.createRange();
        r.setStart(el.firstChild || el, Math.min(off, up.length));
        r.collapse(true);
        sel.removeAllRanges();
        sel.addRange(r);
      } catch(e) {}
    }
  });
}

function makeEditableDiv(cls, value, onBlur) {
  var d = document.createElement('div');
  d.className = cls;
  d.contentEditable = 'true';
  d.textContent = value || '';
  autoUpper(d);
  d.addEventListener('blur', function() { onBlur(d.textContent.trim()); });
  return d;
}

function hexToRgba(hex, alpha) {
  var h = hex.replace('#', '');
  var r = parseInt(h.substring(0, 2), 16);
  var g = parseInt(h.substring(2, 4), 16);
  var b = parseInt(h.substring(4, 6), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

var STATUS_OPTS = [
  { value: 'In Process',    color: '#43A047' },
  { value: 'For Request',   color: '#1E88E5' },
  { value: 'For Rework',    color: '#FB8C00' },
  { value: 'For Length',    color: '#8E24AA' },
  { value: 'For Rechecking',color: '#FDD835', dark: true },
  { value: 'Missing Wire',  color: '#E53935' },
  { value: 'Swapped Wire',  color: '#00897B' }
];

function applyStatusStyle(tr, sel, status) {
  var opt = STATUS_OPTS.filter(function(o) { return o.value === status; })[0];
  if (opt) {
    tr.style.background = hexToRgba(opt.color, .16);
    sel.style.background = opt.color;
    sel.style.color = opt.dark ? '#1B1F1C' : '#fff';
  } else {
    tr.style.background = '';
    sel.style.background = 'transparent';
    sel.style.color = 'var(--text-secondary)';
  }
}

function makeStatusCell(tr, sr) {
  var td = document.createElement('td');
  var sel = document.createElement('select');
  sel.className = 'status-select';
  var blank = document.createElement('option');
  blank.value = '';
  blank.textContent = '—';
  sel.appendChild(blank);
  STATUS_OPTS.forEach(function(opt) {
    var o = document.createElement('option');
    o.value = opt.value;
    o.textContent = opt.value;
    sel.appendChild(o);
  });
  sel.value = sr.status || '';
  applyStatusStyle(tr, sel, sr.status);
  sel.addEventListener('change', function() {
    sr.status = sel.value;
    applyStatusStyle(tr, sel, sel.value);
  });
  td.appendChild(sel);
  return td;
}

function makeCell(value, onBlur) {
  var span = document.createElement('span');
  span.className = 'sub-cell';
  span.contentEditable = 'true';
  span.textContent = value || '';
  autoUpper(span);
  span.addEventListener('blur', function() { onBlur(span.textContent.trim()); });
  var td = document.createElement('td');
  td.appendChild(span);
  return td;
}

/* ======= BUILD ONE SECTION TABLE ======= */
var SECTIONS = [
  { key: 'straight',   label: 'Straight Wires' },
  { key: 'twisted',    label: 'Twisted' },
  { key: 'jointing',  label: 'Jointing' },
  { key: 'crimping',  label: 'Crimping' },
  { key: 'shieldwire',label: 'Shield Wire' },
  { key: 'soldering', label: 'Soldering' }
];

function buildSectionTable(container, card, sectionKey, sectionLabel, isCustom) {
  var block = document.createElement('div');
  block.className = 'section-block';

  // Section label bar
  var labelBar = document.createElement('div');
  labelBar.className = 'section-label';
  var lSpan = document.createElement('span');
  lSpan.style.opacity = '1';
  lSpan.style.fontWeight = '800';
  lSpan.textContent = sectionLabel;
  var cntSpan = document.createElement('span');
  cntSpan.textContent = card[sectionKey].length + ' row(s)';
  labelBar.appendChild(lSpan);
  if (isCustom) {
    var rmBtn = document.createElement('button');
    rmBtn.className = 'section-rm';
    rmBtn.textContent = '✕';
    rmBtn.title = 'Remove this process';
    (function(key) {
      rmBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        card.extraSections = card.extraSections.filter(function(s) { return s.key !== key; });
        delete card[key];
        rebuildSections(container, card);
      });
    })(sectionKey);
    labelBar.appendChild(rmBtn);
  }
  labelBar.appendChild(cntSpan);
  block.appendChild(labelBar);

  // Table
  if (card[sectionKey].length > 0) {
    var scrollDiv = document.createElement('div');
    scrollDiv.className = 'sub-wrap';
    var tbl = document.createElement('table');
    tbl.className = 'sub-table';

    var thead = document.createElement('thead');
    var htr = document.createElement('tr');
    ['✓','#','Circuit','WT','WS','WL','Machine','Completion Date','Status',''].forEach(function(h) {
      var th = document.createElement('th');
      th.textContent = h;
      htr.appendChild(th);
    });
    thead.appendChild(htr);
    tbl.appendChild(thead);

    var tbody = document.createElement('tbody');
    card[sectionKey].forEach(function(sr, idx) {
      var tr = document.createElement('tr');
      if (sr.done) tr.classList.add('row-done');

      // Checkbox
      var chkTd = document.createElement('td');
      var chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.className = 'sub-check';
      chk.checked = sr.done;
      chk.addEventListener('change', function() {
        tr.classList.toggle('row-done', chk.checked);
        sr.done = chk.checked;
        if (chk.checked) {
          setTimeout(function() {
            card[sectionKey] = card[sectionKey].filter(function(x) { return x.id !== sr.id; });
            rebuildSections(container, card);
          }, 600);
        }
      });
      chkTd.appendChild(chk);
      tr.appendChild(chkTd);

      // #
      var numTd = document.createElement('td');
      numTd.textContent = idx + 1;
      tr.appendChild(numTd);

      tr.appendChild(makeCell(sr.circuit, function(v) { sr.circuit = v; }));
      tr.appendChild(makeCell(sr.wires, function(v) { sr.wires = v; }));
      tr.appendChild(makeCell(sr.ws, function(v) { sr.ws = v; }));
      tr.appendChild(makeCell(sr.wl, function(v) { sr.wl = v; }));

      // Machine
      var machTd = document.createElement('td');
      var machInp = document.createElement('input');
      machInp.type = 'text';
      machInp.setAttribute('list', 'machineList');
      machInp.className = 'machine-inp';
      machInp.value = sr.machine;
      machInp.placeholder = '—';
      machInp.addEventListener('input', function() { sr.machine = machInp.value; });
      machInp.addEventListener('change', function() { machInp.value = machInp.value.toUpperCase(); sr.machine = machInp.value; });
      machTd.appendChild(machInp);
      tr.appendChild(machTd);

      // Date
      var dateTd = document.createElement('td');
      var dateInp = document.createElement('input');
      dateInp.type = 'datetime-local';
      dateInp.className = 'date-inp';
      dateInp.value = sr.compdate || '';
      dateInp.addEventListener('change', function() { sr.compdate = dateInp.value; });
      dateTd.appendChild(dateInp);
      tr.appendChild(dateTd);

      tr.appendChild(makeStatusCell(tr, sr));

      // Delete
      var delTd = document.createElement('td');
      var delBtn = document.createElement('button');
      delBtn.className = 'sub-del';
      delBtn.textContent = '✕';
      (function(subId, key) {
        delBtn.addEventListener('click', function() {
          card[key] = card[key].filter(function(x) { return x.id !== subId; });
          rebuildSections(container, card);
        });
      })(sr.id, sectionKey);
      delTd.appendChild(delBtn);
      tr.appendChild(delTd);

      tbody.appendChild(tr);
    });

    tbl.appendChild(tbody);
    scrollDiv.appendChild(tbl);
    block.appendChild(scrollDiv);
  }

  // Add row button
  var addBtn = document.createElement('div');
  addBtn.className = 'sub-add-row';
  addBtn.textContent = '+ Add ' + sectionLabel;
  (function(key) {
    addBtn.addEventListener('click', function() {
      card.started = true;
      card[key].push(makeSubRow());
      rebuildSections(container, card);
    });
  })(sectionKey);
  block.appendChild(addBtn);

  return block;
}

function getCardRowTotal(card) {
  var base = SECTIONS.reduce(function(sum, s) { return sum + card[s.key].length; }, 0);
  var extra = (card.extraSections || []).reduce(function(sum, s) { return sum + (card[s.key] ? card[s.key].length : 0); }, 0);
  return base + extra;
}

function refreshCardFinished(container, card) {
  var cardEl = container.closest('.card');
  if (!cardEl) return;
  var finished = !!card.started && getCardRowTotal(card) === 0;
  cardEl.classList.toggle('is-finished', finished);
  if (!finished) cardEl.classList.remove('overlay-peek');
}

function addCustomProcess(container, card, btn) {
  if (container.querySelector('.add-process-form')) return;

  var form = document.createElement('div');
  form.className = 'add-process-form';

  var inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'add-process-input';
  inp.placeholder = 'Pangalan ng process...';

  var okBtn = document.createElement('button');
  okBtn.className = 'add-process-ok';
  okBtn.textContent = '✓';

  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'add-process-cancel';
  cancelBtn.textContent = '✕';

  function commit() {
    var name = inp.value.trim();
    if (!name) { rebuildSections(container, card); return; }
    var key = 'custom_' + uid();
    card[key] = [];
    card.extraSections = card.extraSections || [];
    card.extraSections.push({ key: key, label: name });
    rebuildSections(container, card);
  }

  okBtn.addEventListener('click', commit);
  cancelBtn.addEventListener('click', function() { rebuildSections(container, card); });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { rebuildSections(container, card); }
  });

  form.appendChild(inp);
  form.appendChild(okBtn);
  form.appendChild(cancelBtn);
  btn.replaceWith(form);
  inp.focus();
}

function rebuildSections(container, card) {
  container.innerHTML = '';
  SECTIONS.forEach(function(s) {
    container.appendChild(buildSectionTable(container, card, s.key, s.label, false));
  });
  (card.extraSections || []).forEach(function(s) {
    if (!card[s.key]) card[s.key] = [];
    container.appendChild(buildSectionTable(container, card, s.key, s.label, true));
  });

  var addProcBtn = document.createElement('div');
  addProcBtn.className = 'add-process-btn';
  addProcBtn.textContent = '+ Add Other Process';
  addProcBtn.addEventListener('click', function() { addCustomProcess(container, card, addProcBtn); });
  container.appendChild(addProcBtn);

  refreshCardFinished(container, card);
}

/* kept for compat */
function buildSubTable(wrap, cardId) {
  var card = findCard(cardId);
  if (!card) return;
  rebuildSections(wrap, card);
}

/* ======= BUILD CARDS ======= */
function buildCards() {
  var container = document.getElementById('cardContainer');
  container.innerHTML = '';

  cards.forEach(function(card) {
    var el = document.createElement('div');
    el.className = 'card';
    el.dataset.id = card.id;

    /* --- TOP: serial + priority --- */
    var top = document.createElement('div');
    top.className = 'card-top';

    var serial = document.createElement('div');
    serial.className = 'serial-block';
    serial.textContent = card.serial;

    var priBlock = document.createElement('div');
    priBlock.className = 'priority-block';

    var priLabel = document.createElement('div');
    priLabel.className = 'p-label';
    priLabel.textContent = 'Priority No.';

    var priNum = document.createElement('div');
    priNum.className = 'priority-num';
    priNum.contentEditable = 'true';
    priNum.textContent = card.priority;
    priNum.dataset.lvl = getPriorityLevel(card.priority);
    autoUpper(priNum);
    priNum.addEventListener('input', function() {
      card.priority = priNum.textContent.trim();
      priNum.dataset.lvl = getPriorityLevel(card.priority);
    });

    var delBtn = document.createElement('button');
    delBtn.className = 'del-card-btn';
    delBtn.textContent = '✕';
    (function(cid) {
      delBtn.addEventListener('click', function() {
        cards = cards.filter(function(c) { return c.id !== cid; });
        renumber(); buildCards(); updateCount();
      });
    })(card.id);

    priBlock.appendChild(priLabel);
    priBlock.appendChild(priNum);
    priBlock.appendChild(delBtn);
    top.appendChild(serial);
    top.appendChild(priBlock);
    el.appendChild(top);

    /* --- PRODUCT NO. + QTY (one row) --- */
    var prodRow = document.createElement('div');
    prodRow.className = 'info-row';
    var prodLbl = document.createElement('span');
    prodLbl.className = 'lbl';
    prodLbl.textContent = 'Product No.';
    var prodVal = makeEditableDiv('val v-product', card.product, function(v) { card.product = v; });
    var divider = document.createElement('div');
    divider.className = 'divider';
    var qtyLbl = document.createElement('span');
    qtyLbl.className = 'lbl';
    qtyLbl.textContent = 'Qty';
    var qtyVal = makeEditableDiv('val v-qty', card.qty, function(v) { card.qty = v; });
    prodRow.appendChild(prodLbl);
    prodRow.appendChild(prodVal);
    prodRow.appendChild(divider);
    prodRow.appendChild(qtyLbl);
    prodRow.appendChild(qtyVal);
    el.appendChild(prodRow);

    /* --- PRODUCT LINE --- */
    var plRow = document.createElement('div');
    plRow.className = 'info-row';
    var plLbl = document.createElement('span');
    plLbl.className = 'lbl';
    plLbl.textContent = 'Product Line';
    var plVal = makeEditableDiv('val v-prodline', card.prodline, function(v) { card.prodline = v; });
    plRow.appendChild(plLbl);
    plRow.appendChild(plVal);
    el.appendChild(plRow);

    /* --- SUB TABLE --- */
    var subWrap = document.createElement('div');
    el.appendChild(subWrap);
    buildSubTable(subWrap, card.id);

    /* --- FINISHED OVERLAY --- */
    var finOverlay = document.createElement('div');
    finOverlay.className = 'card-finished-overlay';
    finOverlay.innerHTML = '<div class="f-hud"><div class="f-icon">✓</div><div class="f-text">Finished</div><div class="f-sub">Tap to view card</div></div>';
    finOverlay.addEventListener('click', function() { el.classList.add('overlay-peek'); });
    el.appendChild(finOverlay);
    if (card.started && getCardRowTotal(card) === 0) el.classList.add('is-finished');

    container.appendChild(el);
  });
}

function renumber() { cards.forEach(function(c, i) { c.serial = i + 1; }); }

function addCard() {
  cards.push(makeCard(cards.length + 1));
  buildCards(); updateCount();
  var els = document.querySelectorAll('.card');
  if (els.length) els[els.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function clearAll() {
  cards = [makeCard(1)];
  buildCards(); updateCount();
}

function filterAll() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('#cardContainer .card').forEach(function(el) {
    el.style.display = el.textContent.toLowerCase().indexOf(q) >= 0 ? '' : 'none';
  });
}

function updateCount() {
  document.getElementById('rowCount').textContent = cards.length + ' card' + (cards.length !== 1 ? 's' : '');
}

// INIT
cards = [makeCard(1)];
buildCards();
updateCount();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      // Force a check for a newer sw.js every time the app loads
      reg.update();

      // If a new service worker is found, tell it to take over immediately
      reg.addEventListener('updatefound', function() {
        var fresh = reg.installing;
        if (!fresh) return;
        fresh.addEventListener('statechange', function() {
          if (fresh.state === 'installed' && navigator.serviceWorker.controller) {
            fresh.postMessage('SKIP_WAITING');
          }
        });
      });
    });

    // Once the new service worker takes control, reload once so the
    // freshest HTML/CSS/JS is actually used
    var reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (reloaded) return;
      reloaded = true;
      window.location.reload();
    });
  });
}
</script>
